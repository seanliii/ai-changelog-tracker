<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Changelog Tracker — AI 产品更新日志</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e1a;
      --bg-card: #111827;
      --bg-hover: #1a2332;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59,130,246,0.15);
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --purple: #8b5cf6;
      --cyan: #06b6d4;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    header {
      border-bottom: 1px solid var(--border);
      background: rgba(10,14,26,0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
      flex-wrap: wrap;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-text p {
      font-size: 12px; color: var(--text-dim);
      margin-top: 2px;
    }
    .stats-bar {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-size: 20px; font-weight: 700; color: var(--accent);
    }
    .stat-label {
      font-size: 11px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      gap: 16px;
      padding: 20px 0;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1; min-width: 280px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 14px;
      transition: all 0.2s;
    }
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }
    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .view-toggle {
      display: flex;
      gap: 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-btn {
      padding: 8px 14px;
      background: var(--bg-card);
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .view-btn:hover { color: var(--text); }
    .view-btn.active {
      background: var(--accent);
      color: white;
    }

    .main {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
      padding-bottom: 40px;
    }
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    .sidebar h3 {
      font-size: 12px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .vendor-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 24px;
    }
    .vendor-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }
    .vendor-item:hover { background: var(--bg-hover); }
    .vendor-item.active {
      background: var(--accent-glow);
      color: var(--accent);
    }
    .vendor-count {
      font-size: 11px; color: var(--text-dim);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .vendor-item.active .vendor-count {
      background: var(--accent);
      color: white;
    }
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-chip {
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--bg-hover);
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag-chip:hover { background: var(--accent); color: white; }
    .tag-chip.active { background: var(--accent); color: white; }

    .timeline {
      position: relative;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 0; bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .entry {
      position: relative;
      padding-left: 44px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .entry-dot {
      position: absolute;
      left: 10px; top: 20px;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      z-index: 2;
    }
    .entry-dot.new-feature { background: var(--green); }
    .entry-dot.improvement { background: var(--accent); }
    .entry-dot.bugfix { background: var(--amber); }
    .entry-dot.security { background: var(--red); }
    .entry-dot.announcement { background: var(--purple); }
    .entry-dot.breaking { background: var(--cyan); }
    .entry-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .entry-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .entry-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    .entry-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .entry-product {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .product-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      background: var(--bg-hover);
    }
    .entry-version {
      font-family: 'SF Mono', monospace;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--accent-glow);
      color: var(--accent);
    }
    .entry-type {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .type-new-feature { background: rgba(16,185,129,0.15); color: var(--green); }
    .type-improvement { background: rgba(59,130,246,0.15); color: var(--accent); }
    .type-bugfix { background: rgba(245,158,11,0.15); color: var(--amber); }
    .type-security { background: rgba(239,68,68,0.15); color: var(--red); }
    .type-announcement { background: rgba(139,92,246,0.15); color: var(--purple); }
    .type-breaking { background: rgba(6,182,212,0.15); color: var(--cyan); }
    .entry-date {
      font-size: 12px; color: var(--text-dim);
      white-space: nowrap;
    }
    .entry-title {
      font-size: 16px; font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .entry-desc {
      font-size: 14px; color: var(--text-muted);
      line-height: 1.6;
    }
    .entry-tags {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .entry-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      background: var(--bg-hover);
      color: var(--text-dim);
    }
    .entry-detail {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .entry-detail.show { display: block; }
    .detail-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .detail-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .detail-list li::before {
      content: "•";
      color: var(--accent);
      font-weight: bold;
    }
    .entry-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .action-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .card-item:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card-item .entry-header {
      flex-direction: column;
      gap: 8px;
    }
    .card-item .entry-meta {
      justify-content: space-between;
      width: 100%;
    }
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .no-results h3 {
      font-size: 18px; margin-bottom: 8px;
      color: var(--text-muted);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>

    let currentType = 'all';
    let currentVendor = 'all';
    let currentTag = null;
    let searchQuery = '';
    let currentView = 'timeline';

    function init() {
      updateStats();
      renderVendors();
      renderTags();
      renderEntries();
      bindEvents();
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = changelogData.length;
      const thisMonth = changelogData.filter(e => e.date.startsWith('2026-06')).length;
      document.getElementById('stat-this-month').textContent = thisMonth;
      const vendors = new Set(changelogData.map(e => e.vendor));
      document.getElementById('stat-vendors').textContent = vendors.size;
    }

    function renderVendors() {
      const counts = {};
      changelogData.forEach(e => { counts[e.vendor] = (counts[e.vendor] || 0) + 1; });
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      const html = [`<div class="vendor-item ${currentVendor==='all'?'active':''}" data-vendor="all">全部 <span class="vendor-count">${changelogData.length}</span></div>`];
      sorted.forEach(([v, c]) => {
        html.push(`<div class="vendor-item ${currentVendor===v?'active':''}" data-vendor="${v}">${v} <span class="vendor-count">${c}</span></div>`);
      });
      document.getElementById('vendorList').innerHTML = html.join('');
      document.querySelectorAll('.vendor-item').forEach(el => {
        el.addEventListener('click', () => { currentVendor = el.dataset.vendor; renderVendors(); renderEntries(); });
      });
    }

    function renderTags() {
      const counts = {};
      changelogData.forEach(e => e.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 20);
      const html = sorted.map(([t, c]) => `<span class="tag-chip ${currentTag===t?'active':''}" data-tag="${t}">${t} (${c})</span>`).join('');
      document.getElementById('tagCloud').innerHTML = html;
      document.querySelectorAll('.tag-chip').forEach(el => {
        el.addEventListener('click', () => {
          currentTag = currentTag === el.dataset.tag ? null : el.dataset.tag;
          renderTags(); renderEntries();
        });
      });
    }

    function getFilteredData() {
      return changelogData.filter(e => {
        if (currentType !== 'all' && e.type !== currentType) return false;
        if (currentVendor !== 'all' && e.vendor !== currentVendor) return false;
        if (currentTag && !e.tags.includes(currentTag)) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return e.title.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q) ||
                 e.product.toLowerCase().includes(q) || e.tags.some(t => t.toLowerCase().includes(q));
        }
        return true;
      }).sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function renderEntries() {
      const data = getFilteredData();
      const container = document.getElementById('content');
      if (data.length === 0) {
        container.innerHTML = '<div class="no-results"><h3>🔍 未找到结果</h3><p>尝试调整筛选条件或搜索词</p></div>';
        return;
      }
      if (currentView === 'timeline') {
        container.innerHTML = '<div class="timeline">' + data.map(e => renderEntry(e)).join('') + '</div>';
      } else {
        container.innerHTML = '<div class="cards-grid">' + data.map(e => renderCard(e)).join('') + '</div>';
      }
      document.querySelectorAll('.entry-card').forEach(card => {
        card.addEventListener('click', () => {
          const detail = card.querySelector('.entry-detail');
          if (detail) detail.classList.toggle('show');
        });
      });
    }

    function renderEntry(e) {
      return `
        <div class="entry">
          <div class="entry-dot ${e.type}"></div>
          <div class="entry-card" data-id="${e.id}">
            <div class="entry-header">
              <div class="entry-meta">
                <span class="entry-product"><span class="product-icon">${e.vendor[0]}</span>${e.product}</span>
                <span class="entry-version">${e.version}</span>
                <span class="entry-type type-${e.type}">${typeLabel(e.type)}</span>
              </div>
              <span class="entry-date">${e.date}</span>
            </div>
            <div class="entry-title">${e.title}</div>
            <div class="entry-desc">${e.desc}</div>
            <div class="entry-tags">${e.tags.map(t => `<span class="entry-tag">${t}</span>`).join('')}</div>
            <div class="entry-detail">
              <ul class="detail-list">${e.details.map(d => `<li>${d}</li>`).join('')}</ul>
            </div>
          </div>
        </div>`;
    }

    function renderCard(e) {
      return `
        <div class="card-item entry-card" data-id="${e.id}">
          <div class="entry-header">
            <div class="entry-meta">
              <span class="entry-product"><span class="product-icon">${e.vendor[0]}</span>${e.product}</span>
              <span class="entry-version">${e.version}</span>
            </div>
            <span class="entry-date">${e.date}</span>
          </div>
          <span class="entry-type type-${e.type}">${typeLabel(e.type)}</span>
          <div class="entry-title" style="margin-top:8px">${e.title}</div>
          <div class="entry-desc">${e.desc}</div>
          <div class="entry-tags">${e.tags.slice(0,4).map(t => `<span class="entry-tag">${t}</span>`).join('')}</div>
          <div class="entry-detail">
            <ul class="detail-list">${e.details.map(d => `<li>${d}</li>`).join('')}</ul>
          </div>
        </div>`;
    }

    function typeLabel(type) {
      const labels = { 'new-feature': '新功能', 'improvement': '改进', 'bugfix': '修复', 'security': '安全', 'announcement': '发布', 'breaking': 'Breaking' };
      return labels[type] || type;
    }

    function bindEvents() {
      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        if (searchQuery) {
          currentVendor = 'all';
          currentType = 'all';
          currentTag = null;
          renderVendors();
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          document.querySelector('.filter-btn[data-type="all"]').classList.add('active');
        }
        renderEntries();
      });
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentType = btn.dataset.type;
          renderEntries();
        });
      });
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentView = btn.dataset.view;
          renderEntries();
        });
      });
    }

    init();
  </script>
